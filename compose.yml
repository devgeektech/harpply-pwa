services:
  # ======================
  # Frontend (Next.js)
  # ======================
  web:
    container_name: app-web
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - frontend
      - backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3001}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ======================
  # Backend (NestJS)
  # ======================
  backend:
    container_name: app-backend
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    networks:
      - backend
      - database
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-app_db}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ======================
  # Admin Panel
  # ======================
  admin:
    container_name: app-admin
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
    ports:
      - "${ADMIN_PORT:-3002}:8080"
    networks:
      - frontend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ======================
  # PostgreSQL
  # ======================
  db:
    container_name: app-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - database
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  frontend:
  backend:
  database:
    # internal: false so host can reach db via localhost:5432

volumes:
  postgres_data:
